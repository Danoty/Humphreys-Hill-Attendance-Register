<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Login | Humphreys Hill EventPro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#062c22">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body>
  <section class="login-page">
    <div class="login-card">
      <div class="logo">HH</div>
      <h1>EventPro Login</h1>
      <p>Humphreys Hill House premium event desk</p>

      <label>Username
        <input id="username" value="admin" autocomplete="username">
      </label>

      <label>Password
        <input id="password" type="password" value="admin123" autocomplete="current-password">
      </label>

      <button id="loginBtn" class="btn primary full">Login</button>
      <p id="loginMessage" class="message"></p>

      <div class="hint">
        <b>Demo Accounts</b><br>
        Admin: admin / admin123<br>
        Reception: reception / reception123<br>
        Reports: reports / reports123
      </div>
    </div>
  </section>

  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
